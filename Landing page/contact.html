<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li><a href="feature.html" class="nav-link">Features</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-form">
            <h1>Contact Us</h1>
            <form action="#" method="post">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>Connect with us on social media:</p>
            <div class="social-icons">
                <a href="#" class="social-icon">
                    <img src="https://via.placeholder.com/30x30/ff6347/ffffff?text=FB" alt="Facebook">
                </a>
                <a href="#" class="social-icon">
                    <img src="https://via.placeholder.com/30x30/1da1f2/ffffff?text=TW" alt="Twitter">
                </a>
                <a href="#" class="social-icon">
                    <img src="https://via.placeholder.com/30x30/000000/ffffff?text=IN" alt="Instagram">
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
